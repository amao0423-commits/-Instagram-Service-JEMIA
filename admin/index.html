<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問い合わせ管理｜JEMIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', '"Hiragino Kaku Gothic ProN"', 'Meiryo', 'sans-serif'],
          },
          colors: {
            brand: { DEFAULT: '#002255', muted: '#eef2f6' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
      <div class="flex min-w-0 items-center gap-3">
        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-brand text-sm font-bold text-white">
          J
        </div>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-brand">JEMIA</p>
          <p class="truncate text-xs text-slate-500">お問い合わせ管理</p>
        </div>
        <span id="notify-wrap" class="relative hidden shrink-0" title="未対応の問い合わせがあります">
          <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-600">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          </span>
          <span id="notify-dot" class="absolute right-1 top-1 h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white"></span>
        </span>
      </div>
      <div id="header-actions" class="hidden items-center gap-2">
        <button type="button" id="btn-logout" class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600 hover:bg-slate-50 sm:text-sm">
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8">
    <p id="view-loading" class="py-16 text-center text-sm text-slate-500">読み込み中…</p>
    <!-- ログイン -->
    <section id="view-login" class="hidden mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
      <h1 class="text-lg font-bold text-brand">管理画面ログイン</h1>
      <p class="mt-2 text-sm text-slate-600">パスワードを入力して一覧を表示します。</p>
      <form id="form-login" class="mt-6 space-y-4">
        <div>
          <label for="login-password" class="block text-sm font-medium text-slate-700">パスワード</label>
          <input id="login-password" type="password" autocomplete="current-password" required
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/20" />
        </div>
        <p id="login-error" class="hidden text-sm text-red-600"></p>
        <button type="submit" id="btn-login"
          class="w-full rounded-lg bg-brand px-4 py-2.5 text-sm font-semibold text-white shadow hover:bg-[#001d44] disabled:opacity-60">
          ログイン
        </button>
      </form>
    </section>

    <!-- ダッシュボード -->
    <section id="view-dashboard" class="hidden">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-lg font-bold text-slate-900 sm:text-xl">問い合わせ一覧</h1>
          <p class="text-sm text-slate-500">新しい順に表示しています。</p>
        </div>
        <p id="dash-meta" class="text-xs text-slate-400"></p>
      </div>

      <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
            <thead class="bg-slate-50 text-xs font-semibold uppercase tracking-wide text-slate-500">
              <tr>
                <th class="whitespace-nowrap px-4 py-3">日時</th>
                <th class="whitespace-nowrap px-4 py-3">お名前</th>
                <th class="min-w-[10rem] px-4 py-3">メール</th>
                <th class="whitespace-nowrap px-4 py-3">種別</th>
                <th class="whitespace-nowrap px-4 py-3">業種</th>
                <th class="whitespace-nowrap px-4 py-3">ステータス</th>
                <th class="min-w-[12rem] px-4 py-3">内容（抜粋）</th>
              </tr>
            </thead>
            <tbody id="tbody-contacts" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
        <p id="empty-state" class="hidden px-4 py-12 text-center text-sm text-slate-500">問い合わせはまだありません。</p>
      </div>
    </section>
  </main>

  <!-- モーダル -->
  <div id="modal-backdrop" class="fixed inset-0 z-40 hidden bg-black/40 backdrop-blur-[1px]" aria-hidden="true"></div>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-xl">
      <div class="border-b border-slate-100 px-5 py-4">
        <h2 id="modal-title" class="text-lg font-bold text-brand">問い合わせ詳細</h2>
        <p class="mt-1 text-xs text-slate-500">内容を確認し、ステータスとメモを更新できます。</p>
      </div>
      <div class="space-y-4 px-5 py-4 text-sm">
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">受信日時</span>
          <span id="m-created" class="text-slate-800"></span>
        </div>
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">お名前</span>
          <span id="m-name" class="text-slate-800"></span>
        </div>
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">メール</span>
          <a id="m-email" href="#" class="break-all text-brand underline"></a>
        </div>
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">種別</span>
          <span id="m-type" class="text-slate-800"></span>
        </div>
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">業種</span>
          <span id="m-industry" class="text-slate-800"></span>
        </div>
        <div class="grid gap-1">
          <span class="text-xs font-medium text-slate-500">問い合わせ内容</span>
          <pre id="m-message" class="max-h-48 overflow-y-auto whitespace-pre-wrap rounded-lg bg-slate-50 p-3 text-xs text-slate-800"></pre>
        </div>
        <div>
          <label for="m-status" class="block text-xs font-medium text-slate-500">ステータス</label>
          <select id="m-status" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/20">
            <option value="未対応">未対応</option>
            <option value="配布済">配布済</option>
            <option value="契約">契約</option>
            <option value="失注">失注</option>
          </select>
        </div>
        <div>
          <label for="m-memo" class="block text-xs font-medium text-slate-500">管理メモ</label>
          <textarea id="m-memo" rows="4" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/20"></textarea>
        </div>
        <p id="modal-error" class="hidden text-sm text-red-600"></p>
      </div>
      <div class="flex flex-col-reverse gap-2 border-t border-slate-100 px-5 py-4 sm:flex-row sm:justify-end">
        <button type="button" id="modal-cancel" class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">閉じる</button>
        <button type="button" id="modal-save" class="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-[#001d44] disabled:opacity-60">保存</button>
      </div>
    </div>
  </div>

  <script>
(function () {
  var API = {
    contacts: '/api/admin/contacts',
    login: '/api/admin/login',
    logout: '/api/admin/logout'
  };

  var viewLoading = document.getElementById('view-loading');
  var viewLogin = document.getElementById('view-login');
  var viewDash = document.getElementById('view-dashboard');
  var headerActions = document.getElementById('header-actions');
  var notifyWrap = document.getElementById('notify-wrap');
  var tbody = document.getElementById('tbody-contacts');
  var emptyState = document.getElementById('empty-state');
  var dashMeta = document.getElementById('dash-meta');
  var formLogin = document.getElementById('form-login');
  var loginErr = document.getElementById('login-error');
  var btnLogout = document.getElementById('btn-logout');
  var modal = document.getElementById('modal');
  var modalBackdrop = document.getElementById('modal-backdrop');
  var modalCancel = document.getElementById('modal-cancel');
  var modalSave = document.getElementById('modal-save');
  var modalErr = document.getElementById('modal-error');

  var selectedId = null;
  var contactsCache = [];

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function badgeClass(status) {
    switch (status) {
      case '未対応': return 'bg-rose-50 text-rose-800 border border-rose-200';
      case '配布済': return 'bg-blue-50 text-blue-800 border border-blue-200';
      case '契約': return 'bg-emerald-50 text-emerald-800 border border-emerald-200';
      case '失注': return 'bg-slate-100 text-slate-600 border border-slate-200';
      default: return 'bg-slate-50 text-slate-700 border border-slate-200';
    }
  }

  function truncate(s, n) {
    s = String(s || '');
    if (s.length <= n) return s;
    return s.slice(0, n) + '…';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      return d.toLocaleString('ja-JP', { dateStyle: 'medium', timeStyle: 'short' });
    } catch (e) {
      return iso;
    }
  }

  function hideBoot() {
    if (viewLoading) viewLoading.classList.add('hidden');
  }

  function showLogin() {
    hideBoot();
    viewLogin.classList.remove('hidden');
    viewDash.classList.add('hidden');
    headerActions.classList.add('hidden');
    notifyWrap.classList.add('hidden');
  }

  function showDashboard() {
    hideBoot();
    viewLogin.classList.add('hidden');
    viewDash.classList.remove('hidden');
    headerActions.classList.remove('hidden');
  }

  function setNotify(pendingCount) {
    if (pendingCount > 0) {
      notifyWrap.classList.remove('hidden');
    } else {
      notifyWrap.classList.add('hidden');
    }
  }

  function renderTable(rows) {
    tbody.innerHTML = '';
    if (!rows || rows.length === 0) {
      emptyState.classList.remove('hidden');
      dashMeta.textContent = '';
      return;
    }
    emptyState.classList.add('hidden');
    dashMeta.textContent = '全 ' + rows.length + ' 件';

    rows.forEach(function (c) {
      var tr = document.createElement('tr');
      tr.className = 'cursor-pointer hover:bg-slate-50/80';
      tr.dataset.id = c.id;
      var snippet = truncate((c.message || '').replace(/\s+/g, ' '), 72);
      tr.innerHTML =
        '<td class="whitespace-nowrap px-4 py-3 text-slate-600">' + escapeHtml(formatDate(c.created_at)) + '</td>' +
        '<td class="whitespace-nowrap px-4 py-3 font-medium text-slate-900">' + escapeHtml(c.name) + '</td>' +
        '<td class="max-w-[14rem] truncate px-4 py-3 text-slate-600" title="' + escapeHtml(c.email) + '">' + escapeHtml(c.email) + '</td>' +
        '<td class="whitespace-nowrap px-4 py-3 text-slate-600">' + escapeHtml(c.type || '—') + '</td>' +
        '<td class="whitespace-nowrap px-4 py-3 text-slate-600">' + escapeHtml(c.industry) + '</td>' +
        '<td class="whitespace-nowrap px-4 py-3"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-semibold ' + badgeClass(c.status) + '">' + escapeHtml(c.status) + '</span></td>' +
        '<td class="max-w-xs px-4 py-3 text-xs text-slate-500">' + escapeHtml(snippet) + '</td>';
      tr.addEventListener('click', function () { openModal(c.id); });
      tbody.appendChild(tr);
    });
  }

  function loadContacts() {
    return fetch(API.contacts, { credentials: 'include' })
      .then(function (res) {
        if (res.status === 401) {
          showLogin();
          return null;
        }
        return res.json();
      })
      .then(function (data) {
        if (!data) return;
        if (!data.ok) {
          hideBoot();
          alert(data.error || '一覧を読み込めませんでした。');
          showLogin();
          return;
        }
        contactsCache = data.contacts || [];
        setNotify(data.pendingCount || 0);
        renderTable(contactsCache);
        showDashboard();
      })
      .catch(function () {
        hideBoot();
        alert('通信に失敗しました。');
        showLogin();
      });
  }

  formLogin.addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = document.getElementById('login-password').value;
    loginErr.classList.add('hidden');
    fetch(API.login, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({ password: pw })
    })
      .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
      .then(function (_ref) {
        var res = _ref.res;
        var j = _ref.j;
        if (!res.ok) {
          loginErr.textContent = j.error || 'ログインに失敗しました。';
          loginErr.classList.remove('hidden');
          return;
        }
        document.getElementById('login-password').value = '';
        loadContacts();
      })
      .catch(function () {
        loginErr.textContent = '通信に失敗しました。';
        loginErr.classList.remove('hidden');
      });
  });

  btnLogout.addEventListener('click', function () {
    fetch(API.logout, { method: 'POST', credentials: 'include' })
      .finally(function () {
        showLogin();
      });
  });

  function findContact(id) {
    for (var i = 0; i < contactsCache.length; i++) {
      if (contactsCache[i].id === id) return contactsCache[i];
    }
    return null;
  }

  function openModal(id) {
    var c = findContact(id);
    if (!c) return;
    selectedId = id;
    modalErr.classList.add('hidden');
    document.getElementById('m-created').textContent = formatDate(c.created_at);
    document.getElementById('m-name').textContent = c.name || '';
    var em = document.getElementById('m-email');
    em.textContent = c.email || '';
    em.href = 'mailto:' + encodeURIComponent(c.email || '');
    document.getElementById('m-type').textContent = c.type || '—';
    document.getElementById('m-industry').textContent = c.industry || '';
    document.getElementById('m-message').textContent = c.message || '';
    document.getElementById('m-status').value = c.status || '未対応';
    document.getElementById('m-memo').value = c.admin_memo || '';
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    modalBackdrop.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    selectedId = null;
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    modalBackdrop.classList.add('hidden');
    document.body.style.overflow = '';
  }

  modalCancel.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', closeModal);

  modalSave.addEventListener('click', function () {
    if (!selectedId) return;
    modalErr.classList.add('hidden');
    modalSave.disabled = true;
    var status = document.getElementById('m-status').value;
    var memo = document.getElementById('m-memo').value;
    fetch(API.contacts, {
      method: 'PATCH',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({ id: selectedId, status: status, admin_memo: memo })
    })
      .then(function (res) { return res.json().then(function (j) { return { res: res, j: j }; }); })
      .then(function (_ref) {
        var res = _ref.res;
        var j = _ref.j;
        if (!res.ok) {
          modalErr.textContent = j.error || '保存に失敗しました。';
          modalErr.classList.remove('hidden');
          return;
        }
        closeModal();
        loadContacts();
      })
      .catch(function () {
        modalErr.textContent = '通信に失敗しました。';
        modalErr.classList.remove('hidden');
      })
      .finally(function () {
        modalSave.disabled = false;
      });
  });

  loadContacts();
})();
  </script>
</body>
</html>
